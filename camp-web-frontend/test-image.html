<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 2rem;
        }
        .test-section {
            margin: 2rem 0;
            padding: 1rem;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
        }
        img {
            max-width: 300px;
            border: 1px solid #f39c12;
            border-radius: 4px;
            margin: 1rem 0;
        }
        button {
            background: #f39c12;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Image Loading Test</h1>
    
    <div class="test-section">
        <h2>Test Direct Image Access</h2>
        <p>Try loading an image directly from the uploads directory:</p>
        <input type="text" id="imageUrl" placeholder="http://localhost:8000/uploads/filename.jpg" style="width: 100%; padding: 0.5rem; margin: 0.5rem 0;">
        <br>
        <button onclick="testImage()">Test Image</button>
        <button onclick="testApi()">Test API</button>
        <button onclick="listFiles()">List Files</button>
        
        <div id="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Test Results</h2>
        <div id="testResults"></div>
    </div>

    <script>
        async function testImage() {
            const url = document.getElementById('imageUrl').value;
            const result = document.getElementById('result');
            
            if (!url) {
                result.innerHTML = '<p style="color: #e74c3c;">Please enter an image URL</p>';
                return;
            }
            
            result.innerHTML = '<p>Testing: ' + url + '</p>';
            
            try {
                const response = await fetch(url);
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (response.ok) {
                    const blob = await response.blob();
                    console.log('Blob size:', blob.size);
                    console.log('Blob type:', blob.type);
                    
                    const imageUrl = URL.createObjectURL(blob);
                    result.innerHTML = `
                        <p style="color: #27ae60;">✓ Image loaded successfully!</p>
                        <p>Size: ${blob.size} bytes</p>
                        <p>Type: ${blob.type}</p>
                        <img src="${imageUrl}" alt="Test image">
                        <button onclick="window.open('${url}', '_blank')">Open in New Tab</button>
                    `;
                } else {
                    const text = await response.text();
                    console.log('Error response:', text);
                    result.innerHTML = `<p style="color: #e74c3c;">✗ Failed to load image: ${response.status}</p><pre>${text}</pre>`;
                }
            } catch (error) {
                console.error('Error:', error);
                result.innerHTML = `<p style="color: #e74c3c;">✗ Error: ${error.message}</p>`;
            }
        }
        
        async function testApi() {
            const result = document.getElementById('testResults');
            result.innerHTML = '<p>Testing API...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/files');
                console.log('API Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('API Data:', data);
                    
                    const imageFiles = data.assets.filter(f => f.content_type && f.content_type.startsWith('image/'));
                    
                    result.innerHTML = `
                        <p style="color: #27ae60;">✓ API working!</p>
                        <p>Total files: ${data.total}</p>
                        <p>Image files: ${imageFiles.length}</p>
                        <div>
                            ${imageFiles.map(file => `
                                <div style="margin: 1rem 0; padding: 1rem; background: #1a1a2e; border-radius: 4px;">
                                    <strong>${file.filename}</strong><br>
                                    URL: ${file.image_url || 'No URL'}<br>
                                    <button onclick="document.getElementById('imageUrl').value='${file.image_url}'; testImage();">Test This Image</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    const text = await response.text();
                    result.innerHTML = `<p style="color: #e74c3c;">✗ API failed: ${response.status}</p><pre>${text}</pre>`;
                }
            } catch (error) {
                console.error('API Error:', error);
                result.innerHTML = `<p style="color: #e74c3c;">✗ API Error: ${error.message}</p>`;
            }
        }
        
        async function listFiles() {
            const result = document.getElementById('testResults');
            result.innerHTML = '<p>Checking uploads directory...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/uploads/');
                console.log('Uploads response:', response.status);
                
                if (response.ok) {
                    const text = await response.text();
                    result.innerHTML = `
                        <p style="color: #27ae60;">✓ Uploads directory accessible!</p>
                        <p>Status: ${response.status}</p>
                        <pre style="background: #1a1a2e; padding: 1rem; border-radius: 4px; overflow: auto;">${text.substring(0, 500)}...</pre>
                    `;
                } else {
                    const text = await response.text();
                    result.innerHTML = `<p style="color: #e74c3c;">✗ Uploads directory not accessible: ${response.status}</p><pre>${text}</pre>`;
                }
            } catch (error) {
                console.error('Uploads Error:', error);
                result.innerHTML = `<p style="color: #e74c3c;">✗ Uploads Error: ${error.message}</p>`;
            }
        }
        
        // Auto-test on load
        window.onload = function() {
            testApi();
        };
    </script>
</body>
</html>
